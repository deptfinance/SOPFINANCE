<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOP / Alur Kerja Harian</title>
  <style>
    :root {
      --navy: #12345b;
      --blue: #246fa8;
      --sky: #d9eef9;
      --aqua: #2fb7b2;
      --aqua-soft: #e7f8f7;
      --white: #ffffff;
      --orange: #f39a35;
      --orange-soft: #fff0dd;
      --ink: #163047;
      --muted: #647589;
      --line: #c7dceb;
      --shadow: 0 18px 45px rgba(18, 52, 91, 0.14);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        linear-gradient(135deg, rgba(217, 238, 249, 0.95), rgba(231, 248, 247, 0.8) 42%, #ffffff 100%);
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .page-shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      place-items: center;
      border-radius: 8px;
      color: var(--white);
      background: linear-gradient(145deg, var(--navy), var(--aqua));
      box-shadow: var(--shadow);
      font-size: 24px;
      font-weight: 800;
    }

    .brand h1 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.12;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .tab-button {
      min-height: 42px;
      border: 1px solid rgba(18, 52, 91, 0.14);
      border-radius: 999px;
      padding: 8px 14px;
      color: var(--navy);
      background: rgba(255, 255, 255, 0.72);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
    }

    .tab-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(18, 52, 91, 0.12);
    }

    .tab-button.active {
      border-color: var(--navy);
      color: var(--white);
      background: var(--navy);
    }

    .poster {
      overflow: hidden;
      border: 1px solid rgba(18, 52, 91, 0.1);
      border-radius: 8px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .profile-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 22px;
      padding: 26px;
      color: var(--white);
      background:
        linear-gradient(130deg, rgba(18, 52, 91, 0.98), rgba(36, 111, 168, 0.95) 58%, rgba(47, 183, 178, 0.92));
    }

    .person-title {
      display: flex;
      gap: 18px;
      align-items: center;
      min-width: 0;
    }

    .avatar-main {
      display: grid;
      width: 184px;
      height: 184px;
      flex: 0 0 184px;
      place-items: center;
      overflow: hidden;
      border: 4px solid rgba(255, 255, 255, 0.45);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      font-size: 76px;
    }

    .avatar-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .name-line {
      margin: 0;
      font-size: clamp(28px, 4.5vw, 52px);
      line-height: 1;
    }

    .title-line {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.88);
      font-size: clamp(16px, 2vw, 22px);
      line-height: 1.35;
    }

    .focus-box {
      display: grid;
      align-content: center;
      gap: 10px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: var(--radius);
      padding: 16px;
      background: rgba(255, 255, 255, 0.13);
    }

    .focus-label {
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .focus-text {
      margin: 0;
      font-size: 16px;
      line-height: 1.45;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 24px;
      padding: 26px;
      background: linear-gradient(180deg, #ffffff, #f7fbfd);
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .section-head h2 {
      margin: 0;
      color: var(--navy);
      font-size: 24px;
      line-height: 1.15;
    }

    .section-head span {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .timeline {
      position: relative;
      display: grid;
      gap: 14px;
    }

    .timeline::before {
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: 31px;
      width: 3px;
      content: "";
      background: linear-gradient(180deg, var(--aqua), var(--blue));
      border-radius: 999px;
    }

    .activity-card {
      position: relative;
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .activity-marker {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: start;
      justify-items: center;
      gap: 6px;
    }

    .step-number,
    .break-icon {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 3px solid var(--white);
      border-radius: 50%;
      color: var(--white);
      background: var(--blue);
      box-shadow: 0 9px 18px rgba(18, 52, 91, 0.16);
      font-weight: 800;
    }

    .break-icon {
      background: var(--orange);
      font-size: 21px;
    }

    .time-chip {
      width: 64px;
      border-radius: 999px;
      padding: 4px 6px;
      color: var(--navy);
      background: var(--sky);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
    }

    .activity-body {
      border: 1px solid rgba(18, 52, 91, 0.1);
      border-left: 5px solid var(--aqua);
      border-radius: var(--radius);
      padding: 14px;
      background: var(--white);
      box-shadow: 0 10px 24px rgba(18, 52, 91, 0.08);
    }

    .activity-card.break .activity-body {
      border-left-color: var(--orange);
      background: var(--orange-soft);
    }

    .activity-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 11px;
    }

    .mini-avatar {
      display: grid;
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      place-items: center;
      border-radius: 8px;
      color: var(--navy);
      background: var(--aqua-soft);
      font-size: 22px;
    }

    .activity-card.break .mini-avatar {
      background: #ffe1bb;
    }

    .period {
      margin-left: auto;
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--white);
      background: var(--navy);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .activity-card.break .period {
      background: var(--orange);
    }

    .bilingual {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
    }

    .lang-block {
      min-width: 0;
    }

    .lang-tag {
      display: inline-flex;
      margin-bottom: 7px;
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--blue);
      background: var(--sky);
      font-size: 11px;
      font-weight: 800;
    }

    .lang-block h3 {
      margin: 0;
      color: var(--navy);
      font-size: 17px;
      line-height: 1.32;
    }

    .lang-block p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .output-panel {
      align-self: start;
      border: 1px solid rgba(18, 52, 91, 0.1);
      border-radius: var(--radius);
      background: var(--white);
      box-shadow: 0 12px 28px rgba(18, 52, 91, 0.09);
    }

    .output-header {
      padding: 18px;
      color: var(--white);
      background: linear-gradient(135deg, var(--navy), var(--blue));
    }

    .output-header h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .output-header p {
      margin: 6px 0 0;
      color: rgba(255, 255, 255, 0.84);
      font-size: 13px;
    }

    .output-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 16px;
      list-style: none;
    }

    .output-list li {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border: 1px solid rgba(47, 183, 178, 0.18);
      border-radius: var(--radius);
      padding: 11px;
      background: var(--aqua-soft);
      font-size: 14px;
      line-height: 1.45;
    }

    .check {
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border-radius: 50%;
      color: var(--white);
      background: var(--aqua);
      font-weight: 800;
    }

    .placeholder-note {
      margin: 0;
      border-top: 1px solid rgba(18, 52, 91, 0.1);
      padding: 14px 18px 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    footer {
      margin-top: 18px;
      border-radius: 8px;
      padding: 16px;
      color: var(--white);
      background: var(--navy);
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 980px) {
      .topbar,
      .profile-hero,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .tabs {
        justify-content: flex-start;
      }

      .content-grid {
        gap: 18px;
      }
    }

    @media (max-width: 680px) {
      .page-shell {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      .brand {
        align-items: flex-start;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        flex-basis: 38px;
        font-size: 21px;
      }

      .tab-button {
        flex: 1 1 calc(50% - 8px);
        padding-inline: 10px;
      }

      .profile-hero,
      .content-grid {
        padding: 16px;
      }

      .person-title {
        align-items: flex-start;
      }

      .avatar-main {
        width: 132px;
        height: 132px;
        flex-basis: 132px;
        font-size: 56px;
      }

      .section-head {
        display: grid;
      }

      .section-head span {
        text-align: left;
      }

      .timeline::before {
        left: 23px;
      }

      .activity-card {
        grid-template-columns: 48px minmax(0, 1fr);
        gap: 10px;
      }

      .step-number,
      .break-icon {
        width: 36px;
        height: 36px;
      }

      .time-chip {
        width: 48px;
        font-size: 10px;
      }

      .activity-heading {
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .period {
        margin-left: 0;
      }

      .bilingual {
        grid-template-columns: 1fr;
        gap: 12px;
      }
    }
  </style>
</head>

    function createPlaceholderProfile({ id, displayName, shortName, image }) {

          value: "👤",
          image

        activities: [
          createEmptyActivity("08.00–09.00", "Pagi ｜ 上午", 1),

          createEmptyActivity("15.00–16.00", "Siang ｜ 下午", 5),
          createEmptyActivity("16.00–17.00", "Sore ｜ 傍晚", 6)
        ],
        outputs: [
          "Output harian 1 ｜ 每日成果 1",
          "Output harian 2 ｜ 每日成果 2",
          "Output harian 3 ｜ 每日成果 3",
          "Output harian 4 ｜ 每日成果 4"
        ]
      };
    }

    function createEmptyActivity(time, period, number) {
      return {
        time,
        period,
        icon: "📌",
        idTitle: `Kegiatan ${number}`,
        idDescription: "Deskripsi kegiatan akan diisi nanti.",
        zhTitle: `工作項目 ${number}`,
        zhDescription: "工作內容待補充。"
      };
    }

    function renderTabs(activeId) {
      tabsEl.innerHTML = profiles.map((profile) => `
        <button
          class="tab-button ${profile.id === activeId ? "active" : ""}"
          type="button"
          data-profile-id="${profile.id}"
          aria-selected="${profile.id === activeId}"
        >
          ${profile.displayName}
        </button>
      `).join("");
    }

    function renderProfile(profile) {
      const activities = profile.activities.map((activity, index) => {
        const stepNumber = activity.isBreak ? "" : index + 1 - countBreaksBefore(profile.activities, index);
        return `
          <article class="activity-card ${activity.isBreak ? "break" : ""}">
            <div class="activity-marker">
              <div class="${activity.isBreak ? "break-icon" : "step-number"}">${activity.isBreak ? activity.icon : stepNumber}</div>
              <div class="time-chip">${activity.time}</div>
            </div>
            <div class="activity-body">
              <div class="activity-heading">
                <div class="mini-avatar" aria-hidden="true">${activity.icon}</div>
                <span class="period">${activity.period}</span>
              </div>
              <div class="bilingual">
                <div class="lang-block">
                  <h3>${activity.idTitle}</h3>
                  <p>${activity.idDescription}</p>
                </div>
                <div class="lang-block" lang="zh-Hant">
                  <h3>${activity.zhTitle}</h3>
                  <p>${activity.zhDescription}</p>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");

      posterEl.innerHTML = `
        <div class="profile-hero">
          <div class="person-title">
            <div class="avatar-main" aria-label="Avatar ${profile.shortName}">
              ${renderAvatar(profile)}
            </div>
            <div>
              <h2 class="name-line">${profile.displayName}</h2>
            </div>
          </div>
          <aside class="focus-box">
            <span class="focus-label">Fokus pekerjaan ｜ 工作重點</span>
            <p class="focus-text">${profile.focusId}</p>
            <p class="focus-text" lang="zh-Hant">${profile.focusZh}</p>
          </aside>
        </div>

        <div class="content-grid">
          <section>
            <div class="section-head">
              <h2>Jadwal Kegiatan Harian</h2>
              <span>Morning to afternoon workflow ｜ 每日工作流程</span>
            </div>
            <div class="timeline">${activities}</div>
          </section>

          <aside class="output-panel">
            <div class="output-header">
              <h2>Output Harian</h2>
              <p>Ringkasan hasil yang perlu selesai setiap hari</p>
            </div>
            <ol class="output-list">
              ${profile.outputs.map((output) => `
                <li>
                  <span class="check">✓</span>
                  <span>${output}</span>
                </li>
              `).join("")}
            </ol>
            ${profile.isPlaceholder ? `
              <p class="placeholder-note">
                Template ini siap diisi dengan nama jabatan, jadwal, deskripsi bilingual, avatar, dan output harian.
              </p>
            ` : ""}
          </aside>
        </div>
      `;
    }

    function renderAvatar(profile) {
      if (profile.avatar.type === "image") {
        return `<img src="${profile.avatar.image}" alt="${profile.displayName}">`;
      }
      return `<span aria-hidden="true">${profile.avatar.value}</span>`;
    }

    function countBreaksBefore(activities, index) {
      return activities.slice(0, index).filter((activity) => activity.isBreak).length;
    }

    function setActiveProfile(profileId) {
      const profile = profiles.find((item) => item.id === profileId) || profiles[0];
      renderTabs(profile.id);
      renderProfile(profile);
    }

    tabsEl.addEventListener("click", (event) => {
      const button = event.target.closest("[data-profile-id]");
      if (!button) return;
      setActiveProfile(button.dataset.profileId);
    });

    setActiveProfile(profiles[0].id);
  </script>
